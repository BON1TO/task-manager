<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TaskFlow — Team Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
      :root {
        --bg: #0b1020; --bg1: #12172a; --bg2: #171d34;
        --card: #1b2340; --card2: #242d4e;
        --border: rgba(190,205,255,.18); --borderh: rgba(190,205,255,.34);
        --text: #f7f9ff; --muted: rgba(225,233,255,.74); --dim: rgba(225,233,255,.5);
        --g: #30f2b6; --g2: #15c991; --b: #69b0ff; --v: #ae93ff;
        --o: #ffab62; --r: #ff6f91; --y: #ffd166;
        color-scheme: dark;
      }
      body.light-theme {
        --bg: #f6f3ec; --bg1: #f1ede4; --bg2: #e9e2d6;
        --card: #fffdf8; --card2: #f7f1e6;
        --border: rgba(78,62,40,.14); --borderh: rgba(78,62,40,.28);
        --text: #2f2619; --muted: rgba(47,38,25,.72); --dim: rgba(47,38,25,.46);
        --g: #149f73; --g2: #0f7f5c; --b: #326dca; --v: #7251d0;
        --o: #cb7a2f; --r: #cf4a69; --y: #b4892a;
        color-scheme: light;
      }
      body.light-theme{
        background:
          radial-gradient(1200px 600px at 10% -20%, rgba(20,159,115,.12), transparent 65%),
          radial-gradient(900px 500px at 110% 10%, rgba(50,109,202,.1), transparent 60%),
          linear-gradient(180deg,var(--bg1),var(--bg));
      }
      body.light-theme #glc{display:none;}
      body.light-theme #pc{opacity:.2;}
      body.light-theme #loader{background:var(--bg);}
      body.light-theme #auth-screen{background:transparent;}
      body.light-theme #sidebar{background:linear-gradient(180deg,rgba(255,252,245,.98),rgba(246,238,225,.96));box-shadow:6px 0 28px rgba(70,56,34,.1);}
      body.light-theme .auth-card{background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(248,240,226,.9));border-color:rgba(78,62,40,.24);box-shadow:0 16px 46px rgba(70,56,34,.12);}
      body.light-theme #orbit-canvas{opacity:.45;}
      body.light-theme .hero-grid{background-image:linear-gradient(rgba(20,159,115,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(20,159,115,.08) 1px,transparent 1px);}
      body.light-theme #orbit-canvas{opacity:.45;}
      body.light-theme .btn-g{background:rgba(83,63,32,.05);}
      body.light-theme .btn-g:hover{background:rgba(83,63,32,.1);}
      body.light-theme .sb-link:hover{background:rgba(83,63,32,.08);}
      body.light-theme .sb-logout{background:rgba(83,63,32,.05);}
      body.light-theme .badge-dim{background:rgba(83,63,32,.07);}
      body.light-theme .stat-card,
      body.light-theme .recent-tasks-wrap,
      body.light-theme .project-card,
      body.light-theme .kanban-col,
      body.light-theme .task-card,
      body.light-theme .modal{
        background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(247,239,225,.92)),var(--card);
        box-shadow:0 10px 28px rgba(83,63,32,.08);
      }
      body.light-theme .stat-card.sc-g{background:linear-gradient(180deg,rgba(236,255,246,.95),rgba(247,239,225,.92)),var(--card);}
      body.light-theme .stat-card.sc-b{background:linear-gradient(180deg,rgba(238,247,255,.95),rgba(247,239,225,.92)),var(--card);}
      body.light-theme .stat-card.sc-o{background:linear-gradient(180deg,rgba(255,245,232,.96),rgba(247,239,225,.92)),var(--card);}
      body.light-theme .stat-card.sc-r{background:linear-gradient(180deg,rgba(255,238,242,.95),rgba(247,239,225,.92)),var(--card);}
      body.light-theme .stat-card:hover,
      body.light-theme .project-card:hover,
      body.light-theme .task-card:hover{
        transform:translateY(-3px);
        box-shadow:0 18px 36px rgba(83,63,32,.14);
      }
      body.light-theme .page-header{background:transparent;}
      body.light-theme .page-sub{color:var(--muted);}
      body.light-theme .task-row{border-bottom-color:rgba(83,63,32,.09);}
      body.light-theme .task-row:hover{background:rgba(83,63,32,.05);}
      body.light-theme .task-action-btn{background:rgba(83,63,32,.1);color:var(--text);}
      body.light-theme .task-action-btn:hover{background:rgba(83,63,32,.16);}
      body.light-theme .add-task-btn{border-color:rgba(83,63,32,.2);color:var(--muted);}
      body.light-theme .member-row{border-bottom-color:rgba(83,63,32,.09);}
      body.light-theme .new-project-card{background:rgba(83,63,32,.035);}
      body.light-theme .new-project-card:hover{background:linear-gradient(180deg,rgba(20,159,115,.12),rgba(83,63,32,.04));}
      body.light-theme .theme-toggle{background:rgba(255,251,243,.95);}
      body.light-theme #modal-overlay,
      body.light-theme #proj-modal-overlay{background:rgba(92,74,46,.22);}
      body.light-theme .form-input,
      body.light-theme .form-select{background:rgba(83,63,32,.04);}
      body.light-theme .form-select option{background:#fffaf0;color:var(--text);}
      body.light-theme .badge-g{background:rgba(20,159,115,.14);border-color:rgba(20,159,115,.32);}
      body.light-theme .badge-b{background:rgba(50,109,202,.14);border-color:rgba(50,109,202,.32);}
      body.light-theme .badge-v{background:rgba(114,81,208,.14);border-color:rgba(114,81,208,.32);}
      body.light-theme .badge-o{background:rgba(203,122,47,.14);border-color:rgba(203,122,47,.3);}
      body.light-theme .badge-r{background:rgba(207,74,105,.14);border-color:rgba(207,74,105,.3);}
      body.light-theme .sec-head{
        background:linear-gradient(90deg,rgba(20,159,115,.08),rgba(50,109,202,.04),transparent);
      }
      /* Mobile chrome — light theme */
      body.light-theme #mobile-topbar{background:rgba(255,252,245,.97);border-bottom-color:rgba(78,62,40,.15);}
      body.light-theme .mob-logo{color:var(--text);}
      body.light-theme .mob-menu-btn{border-color:rgba(78,62,40,.2);color:var(--muted);}
      body.light-theme #bottom-nav{background:rgba(255,252,245,.97);border-top-color:rgba(78,62,40,.15);}
      body.light-theme .bnav-btn{color:var(--muted);}
      body.light-theme .bnav-btn.active{color:var(--g);}
      body.light-theme #sidebar-overlay{background:rgba(47,38,25,.3);}
      /* Form inputs — light theme */
      body.light-theme .form-input{background:rgba(83,63,32,.06);-webkit-text-fill-color:var(--text);}
      body.light-theme .form-input:focus{background:rgba(83,63,32,.1);}
      body.light-theme .form-input::placeholder{-webkit-text-fill-color:var(--dim);}
      body.light-theme .form-select{background:rgba(83,63,32,.06);-webkit-text-fill-color:var(--text);}
      body.light-theme textarea.form-input{-webkit-text-fill-color:var(--text);}
      /* Auth tabs — light theme */
      body.light-theme .auth-tab{color:var(--muted);}
      body.light-theme .auth-tab.active{background:rgba(20,159,115,.12);color:var(--g);border-bottom-color:var(--g);}
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
      html{scroll-behavior:smooth;font-size:16px;}
      body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
      .hidden{display:none!important;}

      /* ── LOADER ── */
      #loader{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s,visibility .6s;}
      #loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
      .ld-logo{font-family:"Bebas Neue",sans-serif;font-size:48px;letter-spacing:6px;color:var(--text);overflow:hidden;}
      .ld-logo span{display:inline-block;transform:translateY(110%);animation:ldIn .8s cubic-bezier(.16,1,.3,1) forwards;}
      .ld-logo span:nth-child(2){animation-delay:.06s} .ld-logo span:nth-child(3){animation-delay:.12s}
      .ld-logo span:nth-child(4){animation-delay:.18s} .ld-logo span:nth-child(5){animation-delay:.24s}
      .ld-logo span:nth-child(6){animation-delay:.3s}  .ld-logo span:nth-child(7){animation-delay:.36s}
      .ld-logo span:nth-child(8){animation-delay:.42s}
      @keyframes ldIn{to{transform:translateY(0)}}
      .ld-bar-wrap{width:240px;height:1px;background:rgba(255,255,255,.12);border-radius:1px;overflow:hidden;}
      .ld-bar{height:100%;background:linear-gradient(90deg,var(--g),var(--b));width:0;animation:ldBar 1.8s cubic-bezier(.4,0,.2,1) forwards .2s;}
      @keyframes ldBar{to{width:100%}}
      .ld-pct{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;color:var(--dim);}

      /* ── CURSOR ── */
      #cur-dot,#cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:8999;display:none;}
      @media(hover:hover)and(pointer:fine){
        body{cursor:none;}
        #cur-dot{display:block;width:5px;height:5px;background:var(--text);top:0;left:0;transform:translate(-50%,-50%);mix-blend-mode:difference;}
        #cur-ring{display:block;width:28px;height:28px;border:1px solid rgba(0,245,160,.45);top:0;left:0;transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.34,1.56,.64,1),height .35s,border-color .3s,opacity .3s,background .3s;}
        .cbig #cur-ring{width:52px;height:52px;border-color:var(--g);background:rgba(0,245,160,.04);}
        .cbig #cur-dot{opacity:0;}
        .cclick #cur-ring{width:20px;height:20px;background:rgba(0,245,160,.25);}
      }

      /* ── CANVAS LAYERS ── */
      #glc{position:fixed;inset:0;z-index:0;pointer-events:none;}
      #pc{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.7;}

      /* ── BUTTONS (shared) ── */
      .btn-p{display:inline-flex;align-items:center;gap:10px;padding:13px 32px;background:var(--g);color:#040f08;border-radius:8px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,box-shadow .25s;}
      .btn-p:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,245,160,.45);}
      .btn-g{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;color:var(--muted);border-radius:8px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;text-decoration:none;border:1px solid var(--borderh);background:rgba(255,255,255,.05);transition:all .22s;cursor:pointer;}
      .btn-g:hover{background:rgba(255,255,255,.1);color:var(--text);transform:translateY(-1px);}
      .btn-danger{background:rgba(255,79,114,.1);border:1px solid rgba(255,79,114,.3);color:var(--r);}
      .btn-danger:hover{background:rgba(255,79,114,.2);}

      /* ── BADGES ── */
      .badge{display:inline-flex;align-items:center;gap:7px;padding:4px 12px;border-radius:100px;font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
      .badge-g{background:rgba(0,245,160,.09);border:1px solid rgba(0,245,160,.24);color:var(--g);}
      .badge-b{background:rgba(79,158,255,.09);border:1px solid rgba(79,158,255,.24);color:var(--b);}
      .badge-v{background:rgba(157,125,255,.09);border:1px solid rgba(157,125,255,.24);color:var(--v);}
      .badge-o{background:rgba(255,140,66,.09);border:1px solid rgba(255,140,66,.24);color:var(--o);}
      .badge-r{background:rgba(255,79,114,.09);border:1px solid rgba(255,79,114,.3);color:var(--r);}
      .badge-dim{background:rgba(255,255,255,.08);border:1px solid var(--borderh);color:var(--muted);}
      .bd{width:5px;height:5px;border-radius:50%;background:currentColor;animation:bdot 2s ease-in-out infinite;}
      @keyframes bdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.6);opacity:.4}}

      /* ── AUTH SCREEN ── */
      #auth-screen{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;z-index:2;overflow:hidden;}

      .auth-card{position:relative;z-index:3;width:min(420px,92vw);background:rgba(22,24,40,.85);border:1px solid var(--borderh);border-radius:20px;padding:40px;backdrop-filter:blur(24px);}
      .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
      .auth-logo-name{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:4px;color:var(--text);}
      .auth-logo-tag{font-family:"JetBrains Mono",monospace;font-size:7px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;}
      .auth-tabs{display:flex;gap:0;border:1px solid var(--borderh);border-radius:10px;overflow:hidden;margin-bottom:28px;}
      .auth-tab{flex:1;padding:11px;background:transparent;border:none;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .22s;}
      .auth-tab.active{background:rgba(0,245,160,.1);color:var(--g);border-bottom:1px solid var(--g);}
      .auth-form{display:flex;flex-direction:column;gap:14px;}
      .auth-form.hidden{display:none;}
      .form-group{display:flex;flex-direction:column;gap:6px;}
      .form-label{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
      .form-input{-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.07);border:1px solid var(--borderh);border-radius:8px;padding:12px 14px;color:var(--text);-webkit-text-fill-color:var(--text);font-family:"Inter",sans-serif;font-size:16px;outline:none;transition:border-color .22s;width:100%;}
      .form-input:focus{border-color:var(--g);background:rgba(255,255,255,.1);}
      .form-input::placeholder{color:var(--dim);-webkit-text-fill-color:var(--dim);}
      textarea.form-input{-webkit-text-fill-color:var(--text);}
      .form-select{-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.07);border:1px solid var(--borderh);border-radius:8px;padding:12px 14px;color:var(--text);-webkit-text-fill-color:var(--text);font-family:"Inter",sans-serif;font-size:16px;outline:none;cursor:pointer;width:100%;}
      .form-select option{background:var(--card2);color:var(--text);}
      .auth-submit{margin-top:6px;width:100%;}
      .auth-error{margin-top:12px;padding:10px 14px;background:rgba(255,79,114,.08);border:1px solid rgba(255,79,114,.25);border-radius:8px;color:var(--r);font-size:13px;display:none;}
      .auth-error.show{display:block;}

      /* ── APP SHELL ── */
      #app-shell{display:flex;min-height:100vh;position:relative;z-index:2;}

      /* ── SIDEBAR ── */
      #sidebar{width:240px;flex-shrink:0;background:rgba(14,18,34,.92);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;backdrop-filter:blur(20px);}
      .sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
      .sb-logo-name{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);}
      .sb-logo-tag{font-family:"JetBrains Mono",monospace;font-size:7px;letter-spacing:.14em;color:var(--muted);}
      .sb-nav{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:4px;}
      .sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:transparent;width:100%;text-align:left;}
      .sb-link:hover{background:rgba(255,255,255,.08);color:var(--text);}
      .sb-link.active{background:rgba(0,245,160,.08);color:var(--g);border:1px solid rgba(0,245,160,.15);}
      .sb-link svg{flex-shrink:0;opacity:.7;}
      .sb-link.active svg{opacity:1;}
      .sb-section{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:12px 12px 6px;margin-top:8px;}
      .sb-bottom{padding:16px 12px;border-top:1px solid var(--border);}
      .sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
      .sb-avatar{width:32px;height:32px;border-radius:50%;background:rgba(0,245,160,.15);border:1px solid rgba(0,245,160,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--g);flex-shrink:0;}
      .sb-user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
      .sb-user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
      .sb-logout{width:100%;padding:9px;background:rgba(255,255,255,.04);border:1px solid var(--borderh);border-radius:8px;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
      .sb-logout:hover{background:rgba(255,79,114,.08);border-color:rgba(255,79,114,.25);color:var(--r);}

      /* ── MAIN CONTENT ── */
      #main-content{margin-left:240px;flex:1;min-height:100vh;overflow-y:auto;}
      .page-header{padding:32px 40px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
      .page-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(36px,4vw,56px);letter-spacing:1px;line-height:1;}
      .page-sub{color:var(--muted);font-size:13px;margin-top:6px;}
      .page-body{padding:28px 40px 60px;}
      .theme-toggle{display:inline-flex;align-items:center;justify-content:center;padding:13px 18px;border-radius:8px;border:1px solid var(--borderh);background:rgba(255,255,255,.08);color:var(--text);font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;}
      .theme-toggle:hover{transform:translateY(-1px);background:rgba(255,255,255,.14);}
      body.light-theme .theme-toggle{background:rgba(255,255,255,.92);}

      /* ── DASHBOARD ── */
      .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
      .stat-card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:border-color .25s;}
      .stat-card:hover{border-color:var(--borderh);}
      .stat-card::before{content:"";position:absolute;inset:0;opacity:0;transition:opacity .4s;pointer-events:none;}
      .stat-card:hover::before{opacity:1;}
      .sc-g::before{background:radial-gradient(ellipse 80% 70% at 0% 0%,rgba(0,245,160,.06),transparent);}
      .sc-b::before{background:radial-gradient(ellipse 80% 70% at 0% 0%,rgba(79,158,255,.06),transparent);}
      .sc-o::before{background:radial-gradient(ellipse 80% 70% at 0% 0%,rgba(255,140,66,.06),transparent);}
      .sc-r::before{background:radial-gradient(ellipse 80% 70% at 0% 0%,rgba(255,79,114,.06),transparent);}
      .sc-v::before{background:radial-gradient(ellipse 80% 70% at 0% 0%,rgba(157,125,255,.06),transparent);}
      .stat-num{font-family:"Bebas Neue",sans-serif;font-size:42px;line-height:1;letter-spacing:1px;}
      .stat-lbl{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
      .stat-icon{position:absolute;top:18px;right:18px;opacity:.15;font-size:28px;}

      .recent-tasks-wrap{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
      .sec-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
      .sec-head-title{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
      .task-row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.06);transition:background .18s;cursor:pointer;}
      .task-row:last-child{border-bottom:none;}
      .task-row:hover{background:rgba(255,255,255,.04);}
      .task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
      .task-title-cell{flex:1;font-size:14px;font-weight:500;color:var(--text);}
      .task-proj{font-size:11px;color:var(--muted);margin-top:2px;}
      .task-due{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);}
      .task-due.overdue{color:var(--r);}
      .empty-state{padding:48px;text-align:center;color:var(--text);font-size:14px;}
      .empty-icon{font-size:40px;opacity:.3;margin-bottom:12px;}

      /* ── PROJECTS ── */
      .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
      .project-card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
      .project-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc-color,var(--g));opacity:.7;}
      .project-card:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 18px 42px rgba(0,0,0,.38);}
      .pc-name{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.5px;margin-bottom:6px;}
      .pc-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px;min-height:36px;}
      .pc-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
      .pc-stats{display:flex;gap:12px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--dim);}
      .pc-stat span{color:var(--text);font-weight:500;}
      .pc-members{display:flex;}
      .pc-avatar{width:24px;height:24px;border-radius:50%;background:var(--card2);border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-left:-6px;flex-shrink:0;}
      .pc-avatar:first-child{margin-left:0;}
      .new-project-card{border:1px dashed var(--borderh);background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text);font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;min-height:160px;}
      .new-project-card:hover{border-color:rgba(48,242,182,.55);color:var(--g);background:rgba(48,242,182,.08);}

      /* ── PROJECT DETAIL ── */
      .project-back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;border:none;background:none;margin-bottom:6px;padding:4px 0;transition:color .2s;}
      .project-back:hover{color:var(--text);}
      .project-meta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:8px;}
      .member-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
      .member-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;background:var(--card2);border:1px solid var(--border);font-size:11px;color:var(--muted);}
      .member-chip .role-dot{width:6px;height:6px;border-radius:50%;}

      /* ── KANBAN ── */
      .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;}
      .kanban-col{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:14px;overflow:hidden;}
      .kanban-col-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
      .kanban-col-title{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;}
      .kanban-count{font-family:"JetBrains Mono",monospace;font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.1);color:var(--muted);}
      .kanban-body{padding:10px;min-height:80px;display:flex;flex-direction:column;gap:8px;}
      .task-card{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01)),var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;}
      .task-card:hover{border-color:var(--borderh);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25);}
      .task-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4;}
      .task-card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
      .task-card-assignee{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
      .task-card-due{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--dim);}
      .task-card-due.overdue{color:var(--r);}
      .task-card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .18s;}
      .task-card:hover .task-card-actions{opacity:1;}
      .task-action-btn{padding:4px 6px;border-radius:5px;border:none;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;font-size:10px;transition:all .15s;}
      .task-action-btn:hover{background:rgba(255,255,255,.16);color:var(--text);}
      .task-action-btn.del:hover{background:rgba(255,79,114,.15);color:var(--r);}
      .add-task-btn{width:100%;padding:10px;border:1px dashed rgba(255,255,255,.2);border-radius:8px;background:transparent;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin:0 10px 10px;width:calc(100% - 20px);}
      .add-task-btn:hover{border-color:rgba(0,245,160,.3);color:var(--g);background:rgba(0,245,160,.03);}

      /* ── MEMBERS TAB ── */
      .tabs-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
      .tab-btn{padding:12px 20px;border:none;background:transparent;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
      .tab-btn.active{color:var(--g);border-bottom-color:var(--g);}
      .tab-panel{display:none;}
      .tab-panel.active{display:block;}
      .member-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);}
      .member-row:last-child{border-bottom:none;}
      .member-av{width:36px;height:36px;border-radius:50%;background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--b);flex-shrink:0;}
      .member-info{flex:1;}
      .member-name{font-size:14px;font-weight:500;}
      .member-email{font-size:11px;color:var(--muted);}
      .add-member-form{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
      .add-member-form .form-input{flex:1;min-width:180px;}

      /* ── MODAL ── */
      #modal-overlay, #proj-modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;}
      .modal{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),var(--card);border:1px solid var(--borderh);border-radius:20px;width:min(520px,100%);max-height:90vh;overflow-y:auto;padding:32px;}
      .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
      .modal-title{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:.5px;}
      .modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--borderh);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
      .modal-close:hover{background:rgba(255,255,255,.09);color:var(--text);}
      .modal-form{display:flex;flex-direction:column;gap:16px;}
      .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}

      /* ── TOAST ── */
      #toast{position:fixed;bottom:28px;right:16px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(16px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:calc(100vw - 32px);}
      @media(max-width:640px){#toast{bottom:76px;}}
      #toast.show{transform:translateY(0);opacity:1;}
      #toast.success{background:rgba(0,245,160,.12);border:1px solid rgba(0,245,160,.35);color:var(--g);}
      #toast.error{background:rgba(255,79,114,.12);border:1px solid rgba(255,79,114,.3);color:var(--r);}
      #toast.info{background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.3);color:var(--b);}

      /* ── PRIORITY COLORS ── */
      .priority-high{color:var(--r);} .priority-medium{color:var(--o);} .priority-low{color:var(--g);}
      .dot-todo{background:var(--muted);}
      .dot-in-progress{background:var(--b);}
      .dot-done{background:var(--g);}

      /* ── COLOR SWATCH ── */
      .color-swatches{display:flex;gap:8px;flex-wrap:wrap;}
      .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s;}
      .color-swatch.active,.color-swatch:hover{border-color:rgba(255,255,255,.6);transform:scale(1.15);}

      /* ── HERO GRID (auth bg) ── */
      .hero-noise{position:absolute;inset:0;opacity:.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");background-size:180px;}
      .hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,245,160,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,.028) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse 85% 75% at 50% 40%,black 5%,transparent 72%);}
      #orbit-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(100vw,1100px);height:min(100vw,1100px);opacity:.75;pointer-events:none;}

      /* ── MOBILE TOPBAR ── */
      #mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:rgba(14,18,34,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);z-index:200;align-items:center;justify-content:space-between;padding:0 16px;}
      .mob-logo{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:3px;color:var(--text);}
      .mob-menu-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--borderh);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:8px;}
      .mob-menu-btn span{display:block;width:16px;height:1.5px;background:currentColor;border-radius:2px;transition:all .3s;}
      .mob-menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
      .mob-menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
      .mob-menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}

      /* ── SIDEBAR OVERLAY ── */
      #sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
      #sidebar-overlay.show{opacity:1;pointer-events:auto;}

      /* ── BOTTOM NAV ── */
      #bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:62px;background:rgba(14,18,34,.95);border-top:1px solid var(--border);backdrop-filter:blur(20px);z-index:200;align-items:center;justify-content:space-around;padding:0 8px;}
      .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:10px;transition:all .2s;}
      .bnav-btn.active{color:var(--g);}
      .bnav-label{font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;}

      /* ── RESPONSIVE ── */
      @media(max-width:900px){
        #sidebar{width:200px;}
        #main-content{margin-left:200px;}
        .stat-grid{grid-template-columns:repeat(2,1fr);}
        .kanban{grid-template-columns:1fr;}
      }
      @media(max-width:640px){
        /* Show mobile chrome */
        #mobile-topbar{display:flex;}
        #bottom-nav{display:flex;}

        /* Sidebar becomes a slide-in drawer */
        #sidebar{
          width:min(280px,85vw);
          transform:translateX(-110%);
          transition:transform .32s cubic-bezier(.4,0,.2,1);
          top:0;z-index:300;
        }
        #sidebar.open{transform:translateX(0);}
        #sidebar-overlay{display:block;}

        /* Main shifts down for topbar + up for bottom nav */
        #main-content{margin-left:0;padding-top:56px;padding-bottom:70px;}

        .page-header{padding:20px 16px 0;gap:10px;}
        .page-title{font-size:clamp(28px,8vw,40px);}
        .page-body{padding:16px 16px 32px;}

        /* Auth */
        .auth-card{padding:28px 20px;}
        #auth-screen{padding:16px;}

        /* Stats */
        .stat-grid{grid-template-columns:1fr 1fr;gap:10px;}
        .stat-num{font-size:32px;}

        /* Projects */
        .projects-grid{grid-template-columns:1fr;}

        /* Kanban — horizontal scroll so all 3 cols visible */
        .kanban{
          display:flex;
          overflow-x:auto;
          scroll-snap-type:x mandatory;
          -webkit-overflow-scrolling:touch;
          gap:12px;
          padding-bottom:8px;
        }
        .kanban::-webkit-scrollbar{height:3px;}
        .kanban::-webkit-scrollbar-thumb{background:var(--borderh);border-radius:3px;}
        .kanban-col{
          min-width:min(280px,80vw);
          flex-shrink:0;
          scroll-snap-align:start;
        }

        /* Modal — bottom sheet */
        #modal-overlay,#proj-modal-overlay{align-items:flex-end;padding:0;}
        .modal{border-radius:20px 20px 0 0;width:100%;max-height:88vh;}

        /* Misc */
        .page-header>div:last-child{width:100%;}
        .page-header>div:last-child .btn-p{width:100%;justify-content:center;}
        .add-member-form{flex-direction:column;}
        .tabs-row{overflow-x:auto;}
        .project-meta-row{flex-wrap:wrap;gap:8px;}
        .member-row{flex-wrap:wrap;gap:8px;}
        .modal-footer{flex-direction:column-reverse;}
        .modal-footer .btn-g,.modal-footer .btn-p{width:100%;justify-content:center;}
      }

      @media(max-width:380px){
        .stat-grid{grid-template-columns:1fr;}
        .auth-card{padding:24px 16px;}
      }
    </style>
  </head>
  <body>

    <!-- LOADER -->
    <div id="loader">
      <div class="ld-logo">
        <span>T</span><span>A</span><span>S</span><span>K</span><span>F</span><span>L</span><span>O</span><span>W</span>
      </div>
      <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
      <div class="ld-pct" id="ld-pct">Initializing...</div>
    </div>

    <!-- BG CANVASES -->
    <canvas id="glc"></canvas>
    <canvas id="pc"></canvas>

    <!-- CURSOR -->
    <div id="cur-dot"></div>
    <div id="cur-ring"></div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- MOBILE TOPBAR -->
    <div id="mobile-topbar">
      <span class="mob-logo">TaskFlow</span>
      <button class="mob-menu-btn" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- BOTTOM NAV -->
    <div id="bottom-nav">
      <button class="bnav-btn active" id="bnav-dashboard" onclick="navigate('dashboard');closeSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="bnav-label">Dashboard</span>
      </button>
      <button class="bnav-btn" id="bnav-projects" onclick="navigate('projects');closeSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
        <span class="bnav-label">Projects</span>
      </button>
      <button class="bnav-btn" onclick="logout()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span class="bnav-label">Sign Out</span>
      </button>
    </div>

    <!-- ══ AUTH SCREEN ══ -->
    <section id="auth-screen" class="hidden">
      <div class="hero-noise"></div>
      <div class="hero-grid"></div>
      <canvas id="orbit-canvas" width="1000" height="1000"></canvas>


      <div class="auth-card">
        <div class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <polygon points="18,1 34,10.5 34,25.5 18,35 2,25.5 2,10.5" stroke="rgba(0,245,160,.6)" stroke-width=".8" fill="rgba(0,245,160,.08)"/>
            <polygon points="18,8 28,13.5 28,22.5 18,28 8,22.5 8,13.5" stroke="rgba(0,245,160,.25)" stroke-width=".6" fill="rgba(0,245,160,.04)"/>
            <circle cx="18" cy="18" r="3.5" fill="var(--g)" opacity=".95"/>
            <circle cx="18" cy="18" r="6.5" fill="rgba(0,245,160,.1)"/>
          </svg>
          <div>
            <div class="auth-logo-name">TaskFlow</div>
            <div class="auth-logo-tag">Team Task Manager</div>
          </div>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Login</button>
          <button class="auth-tab" data-tab="register">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="l-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="l-pass" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-p auth-submit" id="login-btn">Login</button>
        </form>

        <!-- REGISTER -->
        <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="r-name" placeholder="Jane Smith" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="r-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="r-pass" placeholder="Min 6 characters" required minlength="6" />
          </div>
          <button type="submit" class="btn-p auth-submit" id="register-btn">Create Account</button>
        </form>

        <div class="auth-error" id="auth-error"></div>
      </div>
    </section>

    <!-- ══ APP SHELL ══ -->
    <div id="app-shell" class="hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar">
        <div class="sb-logo">
          <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
            <polygon points="18,1 34,10.5 34,25.5 18,35 2,25.5 2,10.5" stroke="rgba(0,245,160,.6)" stroke-width=".8" fill="rgba(0,245,160,.08)"/>
            <circle cx="18" cy="18" r="3.5" fill="var(--g)" opacity=".95"/>
          </svg>
          <div>
            <div class="sb-logo-name">TaskFlow</div>
            <div class="sb-logo-tag">Team Manager</div>
          </div>
        </div>

        <nav class="sb-nav">
          <button class="sb-link active" data-view="dashboard" onclick="navigate('dashboard');closeSidebar()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </button>
          <button class="sb-link" data-view="projects" onclick="navigate('projects');closeSidebar()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
            Projects
          </button>
        </nav>

        <div class="sb-bottom">
          <div class="sb-user">
            <div class="sb-avatar" id="sb-avatar">?</div>
            <div style="overflow:hidden">
              <div class="sb-user-name" id="sb-name">—</div>
              <div class="sb-user-email" id="sb-email">—</div>
            </div>
          </div>
          <button class="sb-logout" onclick="logout()">Sign Out</button>
        </div>
      </aside>

      <!-- MAIN -->
      <main id="main-content">

        <!-- DASHBOARD VIEW -->
        <div id="view-dashboard" class="view">
          <div class="page-header">
            <div>
              <div class="page-title">Dashboard</div>
              <div class="page-sub" id="dash-greeting">Welcome back</div>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
          </div>

    <script>
    // ═══════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000' : '';

    // ═══════════════════════════════════════════
    // LOADER
    // ═══════════════════════════════════════════
    let ldPct = 0;
    const ldEl = document.getElementById('ld-pct');
    const ldInt = setInterval(() => {
      ldPct = Math.min(ldPct + Math.random() * 18, 92);
      ldEl.textContent = Math.floor(ldPct) + '%';
    }, 120);
    function finishLoader() {
      clearInterval(ldInt);
      ldEl.textContent = '100%';
      setTimeout(() => document.getElementById('loader').classList.add('gone'), 400);
    }

    // ═══════════════════════════════════════════
    // WEBGL AURORA
    // ═══════════════════════════════════════════
    (function(){
      const cv=document.getElementById('glc');
      const gl=cv.getContext('webgl');
      if(!gl){cv.style.display='none';return;}
      function resize(){cv.width=innerWidth;cv.height=innerHeight;gl.viewport(0,0,cv.width,cv.height);}
      resize(); window.addEventListener('resize',resize);
      function mkSh(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
      const vs=mkSh(gl.VERTEX_SHADER,`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`);
      const fs=mkSh(gl.FRAGMENT_SHADER,`precision mediump float;
        uniform float t;uniform vec2 res;
        float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
        float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.0-2.0*f);
          return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}
        void main(){
          vec2 uv=gl_FragCoord.xy/res;
          float n=noise(uv*3.0+vec2(t*.08,t*.04))*0.5+noise(uv*6.0-vec2(t*.05,t*.09))*0.25;
          float g=smoothstep(.3,.75,n)*0.045;
          float b2=smoothstep(.4,.8,noise(uv*4.0+vec2(t*.06,-t*.03)))*0.03;
          gl_FragColor=vec4(0.0,g*0.95+g*.3,g*.62+b2,1.0);
        }`);
      const prog=gl.createProgram();
      gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);gl.useProgram(prog);
      const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
      gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
      const loc=gl.getAttribLocation(prog,'p');
      gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
      const tLoc=gl.getUniformLocation(prog,'t');
      const rLoc=gl.getUniformLocation(prog,'res');
      let start=null;
      (function loop(ts){
        if(!start)start=ts;
        gl.uniform1f(tLoc,(ts-start)*.001);
        gl.uniform2f(rLoc,cv.width,cv.height);
        gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
        requestAnimationFrame(loop);
      })(performance.now());
    })();

    // ═══════════════════════════════════════════
    // PARTICLE NETWORK
    // ═══════════════════════════════════════════
    (function(){
      const cv=document.getElementById('pc');
      const ctx=cv.getContext('2d');
      let W,H,pts=[];
      const isMob=navigator.maxTouchPoints>0;
      const N=isMob?100:250,DIST=isMob?130:180;
      let mx=-9999,my=-9999;
      function particleColors(){
        const isLight = document.body.classList.contains('light-theme');
        return isLight
          ? { linePrefix:'rgba(10,10,10,', dot:'rgba(10,10,10,.62)' }
          : { linePrefix:'rgba(79,158,255,', dot:'rgba(79,158,255,.6)' };
      }
      function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;init();}
      function init(){
        pts=Array.from({length:N},()=>({
          x:Math.random()*W,y:Math.random()*H,
          vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
          r:Math.random()<.15?4.5:Math.random()<.4?3:1.5
        }));
      }
      function hash(x,y,t){const s=Math.sin(x*.008+t*.3)*Math.cos(y*.006+t*.22);return s;}
      function draw(){
        ctx.clearRect(0,0,W,H);
        const now=performance.now()*.001;
        const colors = particleColors();
        pts.forEach(p=>{
          const fx=hash(p.x,p.y,now)*0.18,fy=hash(p.y,p.x,now+5)*0.18;
          p.vx+=fx*.006;p.vy+=fy*.006;
          const dx=mx-p.x,dy=my-p.y,dr=Math.sqrt(dx*dx+dy*dy);
          if(dr<120){p.vx-=dx/dr*.22;p.vy-=dy/dr*.22;}
          p.vx*=.98;p.vy*=.98;
          p.x+=p.vx;p.y+=p.vy;
          if(p.x<0)p.x=W;if(p.x>W)p.x=0;
          if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        });
        for(let i=0;i<pts.length;i++){
          for(let j=i+1;j<pts.length;j++){
            const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(d<DIST){
              ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
              ctx.strokeStyle=`${colors.linePrefix}${(1-d/DIST)*.32})`;ctx.lineWidth=.8;ctx.stroke();
            }
          }
          ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,pts[i].r,0,Math.PI*2);
          ctx.fillStyle=colors.dot;ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      resize();window.addEventListener('resize',resize);
      document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
      document.addEventListener('touchstart',e=>{
        const t=e.touches[0];mx=t.clientX;my=t.clientY;
      },{passive:true});
      document.addEventListener('touchmove',e=>{
        const t=e.touches[0];mx=t.clientX;my=t.clientY;
      },{passive:true});
      document.addEventListener('touchend',()=>{
        setTimeout(()=>{mx=-9999;my=-9999;},600);
      },{passive:true});
      draw();
    })();

    // ═══════════════════════════════════════════
    // CUSTOM CURSOR
    // ═══════════════════════════════════════════
    (function(){
      if(navigator.maxTouchPoints>0)return;
      const dot=document.getElementById('cur-dot');
      const ring=document.getElementById('cur-ring');
      let rx=0,ry=0;
      document.addEventListener('mousemove',e=>{
        dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
        rx+=(e.clientX-rx)*.14;ry+=(e.clientY-ry)*.14;
        ring.style.left=rx+'px';ring.style.top=ry+'px';
        requestAnimationFrame(()=>{rx+=(e.clientX-rx)*.14;ry+=(e.clientY-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';});
      });
      let raf;
      document.addEventListener('mousemove',e=>{
        cancelAnimationFrame(raf);
        raf=requestAnimationFrame(function move(){
          rx+=(e.clientX-rx)*.12;ry+=(e.clientY-ry)*.12;
          ring.style.left=rx+'px';ring.style.top=ry+'px';
        });
      });
      document.addEventListener('mousedown',()=>document.body.classList.add('cclick'));
      document.addEventListener('mouseup',()=>document.body.classList.remove('cclick'));
      document.querySelectorAll('a,button,[data-view]').forEach(el=>{
        el.addEventListener('mouseenter',()=>document.body.classList.add('cbig'));
        el.addEventListener('mouseleave',()=>document.body.classList.remove('cbig'));
      });
    })();
    // ═══════════════════════════════════════════
    // ORBIT CANVAS (Task-related decoration)
    // ═══════════════════════════════════════════
    (function(){
      const canvas=document.getElementById('orbit-canvas');
      if(!canvas)return;
      const ctx=canvas.getContext('2d');
      const W=canvas.width,H=canvas.height;
      const cx=W/2,cy=H/2;
      const NODES=[
        {rx:280,ry:270,tilt:0,speed:.28,offset:-Math.PI/2,col:'#69b0ff',label:'TO DO',icon:'📋'},
        {rx:280,ry:270,tilt:0,speed:.28,offset:Math.PI/2,col:'#ffab62',label:'IN PROGRESS',icon:'⚡'},
        {rx:440,ry:420,tilt:0,speed:-.17,offset:0,col:'#30f2b6',label:'DONE',icon:'✅'},
        {rx:440,ry:420,tilt:0,speed:-.17,offset:Math.PI,col:'#ff6f91',label:'OVERDUE',icon:'🔥'},
      ];
      const SATS=[
        {rx:360,ry:350,tilt:0,speed:.4,offset:.5},
        {rx:360,ry:350,tilt:0,speed:.4,offset:.5+Math.PI},
        {rx:360,ry:350,tilt:0,speed:.4,offset:.5+Math.PI*.5},
        {rx:560,ry:540,tilt:0,speed:-.1,offset:1.2},
        {rx:560,ry:540,tilt:0,speed:-.1,offset:1.2+Math.PI},
        {rx:560,ry:540,tilt:0,speed:-.1,offset:1.2+Math.PI*.67},
      ];
      function hexRgb(hex){
        const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        return [r,g,b];
      }
      function ellipseXY(rx,ry,tilt,angle){
        const x=cx+rx*Math.cos(angle)*Math.cos(tilt)-ry*Math.sin(angle)*Math.sin(tilt);
        const y=cy+rx*Math.cos(angle)*Math.sin(tilt)+ry*Math.sin(angle)*Math.cos(tilt);
        return {x,y};
      }
      function drawEllipsePath(rx,ry,tilt,op){
        ctx.save();ctx.translate(cx,cy);ctx.rotate(tilt);ctx.beginPath();
        ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
        const isLight = document.body.classList.contains('light-theme');
        ctx.strokeStyle=isLight?`rgba(0,0,0,${op*2})`:`rgba(255,255,255,${op*1.5})`;
        ctx.lineWidth=1.5;ctx.setLineDash([6,12]);ctx.stroke();
        ctx.setLineDash([]);ctx.restore();
      }
      function drawPill(x,y,col,label){
        const[r,g,b]=hexRgb(col);
        ctx.font='700 12px JetBrains Mono,monospace';
        const tw=ctx.measureText(label).width;
        const pw=tw+28,ph=32,pr=16;
        const px=x-pw/2,py=y-ph/2;
        const isLight = document.body.classList.contains('light-theme');
        ctx.beginPath();ctx.roundRect(px,py,pw,ph,pr);
        ctx.fillStyle=isLight?'rgba(255,255,255,1)':'rgba(22,24,40,.96)';ctx.fill();
        ctx.strokeStyle=`rgba(${r},${g},${b},.8)`;ctx.lineWidth=2;ctx.stroke();
        ctx.fillStyle=isLight?`rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},1)`:`rgba(${r},${g},${b},1)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(label,x,y+.5);
      }
      function drawSpoke(pos,col){
        const[r,g,b]=hexRgb(col);
        const gr=ctx.createLinearGradient(cx,cy,pos.x,pos.y);
        gr.addColorStop(0,`rgba(${r},${g},${b},0)`);gr.addColorStop(.5,`rgba(${r},${g},${b},.1)`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(pos.x,pos.y);ctx.strokeStyle=gr;ctx.lineWidth=1.2;ctx.stroke();
      }
      let t=0;
      function drawCore(){
        const pulse=.5+.5*Math.sin(t*1.5);
        const corona=ctx.createRadialGradient(cx,cy,0,cx,cy,130);
        corona.addColorStop(0,`rgba(48,242,182,${.12+pulse*.06})`);corona.addColorStop(.4,'rgba(48,242,182,.04)');corona.addColorStop(1,'rgba(48,242,182,0)');
        ctx.beginPath();ctx.arc(cx,cy,130,0,Math.PI*2);ctx.fillStyle=corona;ctx.fill();
        ctx.beginPath();ctx.arc(cx,cy,80+pulse*12,0,Math.PI*2);ctx.strokeStyle=`rgba(48,242,182,${.12+pulse*.08})`;ctx.lineWidth=1.8;ctx.stroke();
        
        const sunGlow=ctx.createRadialGradient(cx,cy,0,cx,cy,52);
        sunGlow.addColorStop(0,'rgba(48,242,182,.55)');sunGlow.addColorStop(.5,'rgba(48,242,182,.15)');sunGlow.addColorStop(1,'rgba(48,242,182,0)');
        ctx.beginPath();ctx.arc(cx,cy,52,0,Math.PI*2);ctx.fillStyle=sunGlow;ctx.fill();
        
        ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.fillStyle=`rgba(48,242,182,${.7+pulse*.2})`;ctx.fill();
        ctx.fillStyle='#040f08';ctx.font='700 18px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('TF',cx,cy+1);
      }
      function frame(){
        ctx.clearRect(0,0,W,H);t+=.009;
        drawEllipsePath(SATS[3].rx,SATS[3].ry,SATS[3].tilt,.08);
        drawEllipsePath(NODES[2].rx,NODES[2].ry,NODES[2].tilt,.25);
        drawEllipsePath(SATS[0].rx,SATS[0].ry,SATS[0].tilt,.12);
        drawEllipsePath(NODES[0].rx,NODES[0].ry,NODES[0].tilt,.25);
        NODES.forEach(n=>{const pos=ellipseXY(n.rx,n.ry,n.tilt,n.offset+t*n.speed);drawSpoke(pos,n.col);});
        drawCore();
        const isLight = document.body.classList.contains('light-theme');
        SATS.forEach((s,i)=>{
          const p=ellipseXY(s.rx,s.ry,s.tilt,s.offset+t*s.speed);
          const r=i>=3?5:3.5,a=i>=3?.25:.35;
          ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=isLight?`rgba(60,80,120,${a})`:`rgba(190,195,225,${a})`;ctx.fill();
        });
        NODES.forEach(n=>{const pos=ellipseXY(n.rx,n.ry,n.tilt,n.offset+t*n.speed);drawPill(pos.x,pos.y,n.col,n.label);});
        requestAnimationFrame(frame);
      }
      frame();
    })();


    // ═══════════════════════════════════════════
    // API HELPER
    // ═══════════════════════════════════════════
    async function apiFetch(path, opts={}) {
      const token = localStorage.getItem('tf_token');
      const headers = { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || 'Request failed');
      return data;
    }

    // ═══════════════════════════════════════════
    // AUTH
    // ═══════════════════════════════════════════
    let currentUser = null;

    function setAuthError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.toggle('show', !!msg);
    }

    async function handleLogin(e) {
      e.preventDefault();
      setAuthError('');
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      try {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value })
        });
        localStorage.setItem('tf_token', data.token);
        currentUser = data.user;
        initApp();
      } catch(err) {
        setAuthError(err.message);
      } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      setAuthError('');
      const btn = document.getElementById('register-btn');
      btn.textContent = 'Creating...';
      btn.disabled = true;
      try {
        const data = await apiFetch('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value })
        });
        localStorage.setItem('tf_token', data.token);
        currentUser = data.user;
        initApp();
      } catch(err) {
        setAuthError(err.message);
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    function logout() {
      localStorage.removeItem('tf_token');
      currentUser = null;
      document.getElementById('app-shell').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('hidden');
    }

    // Auth tab switch
    document.querySelectorAll('.auth-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
        setAuthError('');
      });
    });

    // ═══════════════════════════════════════════
    // APP INIT
    // ═══════════════════════════════════════════
    async function bootstrap() {
      const token = localStorage.getItem('tf_token');
      if (token) {
        try {
          const data = await apiFetch('/api/auth/me');
          currentUser = data.user;
          initApp();
        } catch {
          localStorage.removeItem('tf_token');
          showAuthScreen();
        }
      } else {
        showAuthScreen();
      }
      finishLoader();
    }

    function setMobileChrome(visible) {
      ['mobile-topbar','bottom-nav'].forEach(id => {
        document.getElementById(id).style.display = visible ? '' : 'none';
      });
    }

    function showAuthScreen() {
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('app-shell').classList.add('hidden');
      setMobileChrome(false);
    }

    function initApp() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app-shell').classList.remove('hidden');
      setMobileChrome(true);
      document.getElementById('sb-name').textContent = currentUser.name;
      document.getElementById('sb-email').textContent = currentUser.email;
      document.getElementById('sb-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
      navigate('dashboard');
    }

    // ═══════════════════════════════════════════
    // MOBILE SIDEBAR DRAWER
    // ═══════════════════════════════════════════
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('sidebar-overlay');
      const hb = document.getElementById('hamburger');
      const open = sb.classList.toggle('open');
      hb.classList.toggle('open', open);
      ov.classList.toggle('show', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }
    function closeSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('sidebar-overlay');
      const hb = document.getElementById('hamburger');
      sb.classList.remove('open');
      hb.classList.remove('open');
      ov.classList.remove('show');
      document.body.style.overflow = '';
    }

    // ═══════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════
    let activeView = 'dashboard';

    function navigate(view, data) {
      activeView = view;
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById('view-' + (view === 'project' ? 'project' : view)).classList.remove('hidden');
      document.querySelectorAll('.sb-link').forEach(l => {
        l.classList.toggle('active', l.dataset.view === view || (view === 'project' && l.dataset.view === 'projects'));
      });
      // Sync bottom nav
      document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
      const bnavMap = {dashboard:'bnav-dashboard', projects:'bnav-projects', project:'bnav-projects'};
      if (bnavMap[view]) document.getElementById(bnavMap[view])?.classList.add('active');
      if (view === 'dashboard') loadDashboard();
      else if (view === 'projects') loadProjects();
      else if (view === 'project') loadProject(data);
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    // ═══════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════
    let toastTimer;
    function toast(msg, type='success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
    }

    // ═══════════════════════════════════════════
    // DASHBOARD
    // ═══════════════════════════════════════════
    async function loadDashboard() {
      const greet = document.getElementById('dash-greeting');
      const h = new Date().getHours();
      greet.textContent = `${h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'}, ${currentUser.name.split(' ')[0]}`;
      try {
        const data = await apiFetch('/api/tasks/dashboard');
        document.getElementById('st-total').textContent = data.stats.total;
        document.getElementById('st-done').textContent = data.stats.done;
        document.getElementById('st-progress').textContent = data.stats.inProgress;
        document.getElementById('st-overdue').textContent = data.stats.overdue;
        renderRecentTasks(data.recent);
      } catch(err) {
        toast(err.message, 'error');
      }
    }

    function renderRecentTasks(tasks) {
      const el = document.getElementById('dash-tasks-list');
      if (!tasks.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No tasks assigned yet.<br>Join a project to get started.</div>`;
        return;
      }
      el.innerHTML = tasks.map(t => {
        const now = new Date();
        const isOverdue = t.dueDate && new Date(t.dueDate) < now && t.status !== 'done';
        const dueStr = t.dueDate ? fmtDate(t.dueDate) : '';
        const dotCls = {todo:'dot-todo','in-progress':'dot-in-progress',done:'dot-done'}[t.status];
        return `<div class="task-row" onclick="navigate('project','${t.project?._id || t.project}')">
          <div class="task-dot ${dotCls}"></div>
          <div class="task-title-cell">
            <div>${esc(t.title)}</div>
            <div class="task-proj">${esc(t.project?.name || '')}</div>
          </div>
          <span class="badge ${priBadge(t.priority)}">${t.priority}</span>
          ${dueStr ? `<span class="task-due${isOverdue?' overdue':''}">${dueStr}</span>` : ''}
        </div>`;
      }).join('');
    }

    // ═══════════════════════════════════════════
    // PROJECTS
    // ═══════════════════════════════════════════
    let allProjects = [];

    async function loadProjects() {
      try {
        allProjects = await apiFetch('/api/projects');
        renderProjects(allProjects);
      } catch(err) {
        toast(err.message, 'error');
      }
    }

    function renderProjects(projects) {
      const grid = document.getElementById('projects-grid');
      grid.innerHTML = projects.map(p => {
        const initials = p.members.slice(0,3).map(m => `<div class="pc-avatar" style="background:${avatarBg(m.user?.name||'?')};color:#040f08">${(m.user?.name||'?').charAt(0).toUpperCase()}</div>`).join('');
        const pct = p.taskCount ? Math.round(p.doneCount / p.taskCount * 100) : 0;
        return `<div class="project-card" style="--pc-color:${p.color}" onclick="navigate('project','${p._id}')">
          <div class="pc-name">${esc(p.name)}</div>
          <div class="pc-desc">${esc(p.description || 'No description')}</div>
          <div class="pc-meta">
            <div class="pc-stats">
              <span><span>${p.taskCount}</span> tasks</span>
              <span><span>${pct}%</span> done</span>
            </div>
            <div class="pc-members">${initials}</div>
          </div>
        </div>`;
      }).join('') + `<div class="project-card new-project-card" onclick="showProjectModal()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New Project
      </div>`;
    }

    // ═══════════════════════════════════════════
    // PROJECT DETAIL
    // ═══════════════════════════════════════════
    let currentProject = null;

    async function loadProject(id) {
      if (!id) { navigate('projects'); return; }
      try {
        const data = await apiFetch(`/api/projects/${id}`);
        currentProject = data;
        renderProjectDetail(data);
      } catch(err) {
        toast(err.message, 'error');
        navigate('projects');
      }
    }

    function renderProjectDetail({ project, tasks }) {
      document.getElementById('proj-title').textContent = project.name;
      const role = project.myRole;
      const roleEl = document.getElementById('proj-role-badge');
      roleEl.textContent = role;
      roleEl.className = `badge ${role === 'admin' ? 'badge-g' : 'badge-dim'}`;

      const metaRow = document.getElementById('proj-meta-row');
      metaRow.innerHTML = `<span class="page-sub">${esc(project.description || '')}</span>`;

      // Show/hide add member
      const ams = document.getElementById('add-member-section');
      if (role === 'admin') ams.classList.remove('hidden'); else ams.classList.add('hidden');

      // Add task button
      document.getElementById('add-task-header-btn').onclick = () => openTaskModal(null, project._id, getAllMembers(project));

      renderKanban(tasks, project, role);
      renderMembers(project, role);
    }

    function getAllMembers(project) {
      const owner = { user: project.owner, role: 'admin' };
      const all = [owner, ...project.members.filter(m => m.user?._id !== project.owner?._id)];
      return all;
    }

    function renderKanban(tasks, project, role) {
      const cols = [
        { id: 'todo',        label: 'To Do',      color: 'var(--muted)' },
        { id: 'in-progress', label: 'In Progress', color: 'var(--b)' },
        { id: 'done',        label: 'Done',        color: 'var(--g)' },
      ];
      const board = document.getElementById('kanban-board');
      board.innerHTML = cols.map(col => {
        const colTasks = tasks.filter(t => t.status === col.id);
        const cards = colTasks.map(t => taskCard(t, role)).join('');
        return `<div class="kanban-col">
          <div class="kanban-col-head">
            <span class="kanban-col-title" style="color:${col.color}">${col.label}</span>
            <span class="kanban-count">${colTasks.length}</span>
          </div>
          <div class="kanban-body" id="col-${col.id}">${cards || '<div style="padding:8px;color:var(--dim);font-size:12px;text-align:center">Empty</div>'}</div>
          <button class="add-task-btn" onclick='openTaskModal(null,"${project._id}",${JSON.stringify(getAllMembers(project))})'>+ Add Task</button>
        </div>`;
      }).join('');
    }

    function taskCard(t, role) {
      const now = new Date();
      const isOverdue = t.dueDate && new Date(t.dueDate) < now && t.status !== 'done';
      const assignee = t.assignee ? esc(t.assignee.name) : 'Unassigned';
      const dueStr = t.dueDate ? fmtDate(t.dueDate) : '';
      const canEdit = role === 'admin' || t.createdBy?._id === currentUser?.id || t.assignee?._id === currentUser?.id;
      return `<div class="task-card" onclick='openTaskModal(${JSON.stringify(t)},null,null)'>
        <div class="task-card-actions">
          ${canEdit ? `<button class="task-action-btn" onclick='event.stopPropagation();openTaskModal(${JSON.stringify(t)},null,null)' title="Edit">✎</button>` : ''}
          ${(role==='admin'||t.createdBy?._id===currentUser?.id) ? `<button class="task-action-btn del" onclick="event.stopPropagation();deleteTask('${t._id}')" title="Delete">✕</button>` : ''}
        </div>
        <div class="task-card-title">${esc(t.title)}</div>
        <div class="task-card-meta">
          <span class="badge ${priBadge(t.priority)}">${t.priority}</span>
          <span class="task-card-assignee">
            <span style="width:16px;height:16px;border-radius:50%;background:${avatarBg(assignee)};display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#040f08;font-weight:700">${assignee.charAt(0)}</span>
            ${assignee}
          </span>
          ${dueStr ? `<span class="task-card-due${isOverdue?' overdue':''}">${dueStr}</span>` : ''}
        </div>
      </div>`;
    }

    function renderMembers(project, role) {
      const el = document.getElementById('members-list');
      const allMems = getAllMembers(project);
      el.innerHTML = allMems.map(m => {
        const u = m.user || {};
        const isOwner = project.owner?._id === u._id || project.owner === u._id;
        return `<div class="member-row">
          <div class="member-av">${(u.name||'?').charAt(0).toUpperCase()}</div>
          <div class="member-info">
            <div class="member-name">${esc(u.name||'Unknown')}</div>
            <div class="member-email">${esc(u.email||'')}</div>
          </div>
          <span class="badge ${m.role==='admin'?'badge-g':'badge-dim'}">${isOwner?'owner':m.role}</span>
          ${role==='admin'&&!isOwner&&u._id!==currentUser?.id ? `<button class="btn-g btn-danger" style="padding:6px 12px;font-size:10px" onclick="removeMember('${u._id}')">Remove</button>` : ''}
        </div>`;
      }).join('');
    }

    async function addMember() {
      const email = document.getElementById('invite-email').value.trim();
      const mRole = document.getElementById('invite-role').value;
      if (!email) return;
      try {
        await apiFetch(`/api/projects/${currentProject.project._id}/members`, {
          method: 'POST', body: JSON.stringify({ email, role: mRole })
        });
        document.getElementById('invite-email').value = '';
        toast('Member added');
        loadProject(currentProject.project._id);
      } catch(err) { toast(err.message, 'error'); }
    }

    async function removeMember(userId) {
      if (!confirm('Remove this member?')) return;
      try {
        await apiFetch(`/api/projects/${currentProject.project._id}/members/${userId}`, { method: 'DELETE' });
        toast('Member removed');
        loadProject(currentProject.project._id);
      } catch(err) { toast(err.message, 'error'); }
    }

    // ═══════════════════════════════════════════
    // TASK MODAL
    // ═══════════════════════════════════════════
    let editingTaskId = null;
    let taskModalProjectId = null;

    function openTaskModal(task, projectId, members) {
      editingTaskId = task ? task._id : null;
      taskModalProjectId = projectId || currentProject?.project?._id;

      const mems = members || (currentProject ? getAllMembers(currentProject.project) : []);

      document.getElementById('modal-title').textContent = task ? 'Edit Task' : 'New Task';
      document.getElementById('t-title').value = task ? task.title : '';
      document.getElementById('t-desc').value = task ? task.description : '';
      document.getElementById('t-status').value = task ? task.status : 'todo';
      document.getElementById('t-priority').value = task ? task.priority : 'medium';
      document.getElementById('t-due').value = task?.dueDate ? task.dueDate.slice(0,10) : '';

      const sel = document.getElementById('t-assignee');
      sel.innerHTML = `<option value="">Unassigned</option>` +
        mems.map(m => {
          const u = m.user || m;
          const uid = u._id || u.id;
          const curId = task?.assignee?._id || task?.assignee;
          return `<option value="${uid}" ${curId===uid?'selected':''}>${esc(u.name||u.email||uid)}</option>`;
        }).join('');

      document.getElementById('modal-save-btn').textContent = task ? 'Update Task' : 'Save Task';
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
    function closeModalOnBg(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    async function saveTask() {
      const title = document.getElementById('t-title').value.trim();
      if (!title) { toast('Title is required', 'error'); return; }
      const btn = document.getElementById('modal-save-btn');
      btn.textContent = 'Saving...'; btn.disabled = true;
      const payload = {
        title,
        description: document.getElementById('t-desc').value,
        status: document.getElementById('t-status').value,
        priority: document.getElementById('t-priority').value,
        assignee: document.getElementById('t-assignee').value || null,
        dueDate: document.getElementById('t-due').value || null,
        projectId: taskModalProjectId,
      };
      try {
        if (editingTaskId) {
          await apiFetch(`/api/tasks/${editingTaskId}`, { method: 'PUT', body: JSON.stringify(payload) });
          toast('Task updated');
        } else {
          await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify(payload) });
          toast('Task created');
        }
        closeModal();
        if (currentProject) loadProject(currentProject.project._id);
      } catch(err) {
        toast(err.message, 'error');
      } finally {
        btn.textContent = editingTaskId ? 'Update Task' : 'Save Task';
        btn.disabled = false;
      }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      try {
        await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
        toast('Task deleted');
        if (currentProject) loadProject(currentProject.project._id);
      } catch(err) { toast(err.message, 'error'); }
    }

    // ═══════════════════════════════════════════
    // PROJECT MODAL
    // ═══════════════════════════════════════════
    let selectedColor = '#00f5a0';

    document.querySelectorAll('.color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        selectedColor = sw.dataset.color;
      });
    });

    function showProjectModal() {
      document.getElementById('pm-name').value = '';
      document.getElementById('pm-desc').value = '';
      selectedColor = '#00f5a0';
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === '#00f5a0'));
      document.getElementById('proj-modal-overlay').classList.remove('hidden');
    }
    function closeProjModal() {
      document.getElementById('proj-modal-overlay').classList.add('hidden');
    }
    function closeProjModalOnBg(e) {
      if (e.target === document.getElementById('proj-modal-overlay')) closeProjModal();
    }

    function bindProjectModalTriggers() {
      const headerBtn = document.getElementById('new-project-btn');
      if (headerBtn) {
        headerBtn.onclick = null;
        headerBtn.addEventListener('click', e => {
          e.preventDefault();
          showProjectModal();
        });
      }

      const projectsGrid = document.getElementById('projects-grid');
      if (projectsGrid) {
        projectsGrid.addEventListener('click', e => {
          const newCard = e.target.closest('.new-project-card');
          if (!newCard) return;
          e.preventDefault();
          e.stopPropagation();
          showProjectModal();
        });
      }
    }

    async function saveProject() {
      const name = document.getElementById('pm-name').value.trim();
      if (!name) { toast('Project name required', 'error'); return; }
      const btn = document.getElementById('proj-save-btn');
      btn.textContent = 'Creating...'; btn.disabled = true;
      try {
        await apiFetch('/api/projects', {
          method: 'POST',
          body: JSON.stringify({ name, description: document.getElementById('pm-desc').value, color: selectedColor })
        });
        toast('Project created');
        closeProjModal();
        loadProjects();
      } catch(err) {
        toast(err.message, 'error');
      } finally {
        btn.textContent = 'Create Project';
        btn.disabled = false;
      }
    }

    // ═══════════════════════════════════════════
    // UTILS
    // ═══════════════════════════════════════════
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(d) {
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function priBadge(p) {
      return {high:'badge-r',medium:'badge-o',low:'badge-g'}[p] || 'badge-dim';
    }
    function avatarBg(name) {
      const colors = ['#00f5a0','#4f9eff','#9d7dff','#ff8c42','#ff4f72','#ffd166'];
      let h = 0;
      for (let i = 0; i < (name||'').length; i++) h = (h*31 + (name||'').charCodeAt(i)) & 0xffff;
      return colors[h % colors.length];
    }

    // ═══════════════════════════════════════════
    // THEME
    // ═══════════════════════════════════════════
    function applyTheme(theme) {
      const isLight = theme === 'light';
      document.body.classList.toggle('light-theme', isLight);
      document.querySelectorAll('.theme-toggle').forEach(btn => {
        btn.textContent = isLight ? 'Dark Mode' : 'Light Mode';
      });
      const metaTheme = document.getElementById('meta-theme-color');
      if (metaTheme) metaTheme.content = isLight ? '#f6f3ec' : '#0b1020';
    }

    function toggleTheme() {
      const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
      localStorage.setItem('tf_theme', next);
      applyTheme(next);
    }

    // ═══════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeProjModal(); }
    });

    // ═══════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════
    localStorage.setItem('tf_theme', 'dark');
    applyTheme('dark');
    bindProjectModalTriggers();
    bootstrap();
    </script>
  </body>
</html>
